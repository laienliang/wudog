networks:
  wudong-net:
    external: true

services:
  # ====== 1. MySQL 数据库 ======
  mysql:
    image: mysql:8.0
    container_name: wudong-mysql
    networks: [wudong-net]
    ports:
      - '3307:3306'
    environment:
      MYSQL_ROOT_PASSWORD: '123456'
      MYSQL_DATABASE: 'wudong_tourism'
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/sql/wudong_tourism.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-p123456']
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  # ====== 2. Redis 缓存 ======
  redis:
    image: redis:7-alpine
    container_name: wudong-redis
    networks: [wudong-net]
    ports:
      - '6379:6379'
    restart: unless-stopped

  # ====== 3. 后端 API ======
  backend:
    build: ./backend
    image: wudong-backend:latest
    container_name: wudong-backend
    networks: [wudong-net]
    ports:
      - '3000:3000'
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=123456
      - MYSQL_DATABASE=wudong_tourism
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    restart: unless-stopped

  # ====== 4. 前端 Nginx ======
  frontend:
    build: ./web
    image: wudong-frontend:latest
    container_name: wudong-frontend
    networks: [wudong-net]
    ports:
      - '80:80'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql-data:
