services:
  mysql:
    image: mysql:8.0
    command:
      - --default-authentication-plugin=mysql_native_password
      - --sql_mode=STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION
      - --group_concat_max_len=102400
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: cool
      MYSQL_USER: cool
      MYSQL_PASSWORD: "123456"
    ports:
      - "13306:3306"
    volumes:
      - ./data/mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:6.2
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    ports:
      - "16379:6379"
    volumes:
      - ./data/redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  midway:
    build:
      context: ./cool-admin-midway
    restart: unless-stopped
    volumes:
      - ${HOME}/.cool-admin:/root/.cool-admin
    environment:
      TZ: Asia/Shanghai
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: "123456"
      DB_NAME: cool
      DB_SYNCHRONIZE: "true"
      COOL_EPS: "true"
      COOL_INIT_DB: "true"
      COOL_INIT_MENU: "true"
      REDIS_HOST: redis
      UPLOAD_MAX_SIZE: 200mb
    ports:
      - "8001:8001"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  cool-admin-vue:
    build:
      context: ./cool-admin-vue
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - midway

  pc-web:
    build:
      context: ./pc-web
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3000"
      NUXT_PUBLIC_API_BASE: http://localhost:8001/open/client
    ports:
      - "3000:3000"
    depends_on:
      - midway

volumes:
  mysql-data:
  redis-data:
