<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <!-- 苗银蓝主色 -->
    <linearGradient id="mountainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3B7BC5"/>
      <stop offset="100%" style="stop-color:#1F5FA8"/>
    </linearGradient>
  </defs>

  <!-- ===== 左侧图标区域 (16×16px 梯田山脉徽标) ===== -->
  <g transform="translate(12, 12)">
    <!-- 山体背景 -->
    <path d="M0,16 L8,2 L16,16 Z" fill="url(#mountainGrad)" opacity="0.9"/>
    <!-- 主峰 -->
    <path d="M4,16 L10,0 L16,16 Z" fill="#1F5FA8"/>
    <!-- 雪顶/云带 -->
    <rect x="8.5" y="5" width="3" height="1.2" rx="0.6" fill="#FFFFFF" opacity="0.85"/>
    <!-- 梯田水平条带 -->
    <path d="M0,13 L16,13 L16,14 L0,14 Z" fill="#FFFFFF" opacity="0.5"/>
    <path d="M0,10 L16,10 L16,11 L0,11 Z" fill="#FFFFFF" opacity="0.5"/>
    <path d="M0,7  L16,7  L16,8  L0,8  Z" fill="#FFFFFF" opacity="0.5"/>
    <!-- 梯田轮廓线 (装饰) -->
    <rect x="0" y="0" width="16" height="16" rx="3" fill="none" stroke="#1F5FA8" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- ===== 右侧文字区域 ===== -->
  <text x="38" y="38"
        font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif"
        font-weight="bold"
        font-size="26"
        fill="#1F5FA8"
        letter-spacing="2">
    乌东文旅
  </text>
</svg>
